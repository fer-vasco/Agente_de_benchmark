name: Buscar_benchmark

on:
  schedule:
    # Todos los días a las 11:45 hora Argentina (14:45 UTC)
    - cron: '45 14 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    
    - name: Install dependencies (if needed)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Python script
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        
      run: python Consultas_de_Claude.py

    - name: Install dependencies (if needed)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Commit parquet actualizado
      run: |
        git config user.name "github-actions"
        git config user.email "fer-vasco[bot]@users.noreply.github.com"
        git add casos_reportados.csv
        git diff --cached --quiet || git commit -m "Actualizar casos reportados" || echo "No changes to commit"
        git push || echo "Nothing to push"
